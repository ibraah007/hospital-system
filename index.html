<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital HQ - Role Restricted</title>
    <style>
        :root {
            --bg: #f4f7f6; --card: #ffffff; --text: #333;
            --primary: #007bff; --danger: #dc3545; --success: #28a745; 
            --admin: #e63946; --warning: #ffc107; --border: #ddd;
        }
        body.dark {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; 
            --primary: #375a7f; --border: #333;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }

        /* Auth UI */
        #loginOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }

        /* Dashboard */
        .admin-bar { background: #2c3e50; color: white; padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section { background: var(--card); padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .hidden { display: none !important; }

        /* Alerts */
        .alert-box { padding: 15px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; border-left: 6px solid; }
        .alert-danger { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border-color: #ffeeba; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(0,0,0,0.05); }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; color: white;}
        .badge.ChiefAdmin { background: var(--admin); }
        .badge.Official1 { background: #457b9d; }
        .badge.Official2 { background: #2a9d8f; }
        .badge.Member { background: #6c757d; }

        .control-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-small { width: auto; padding: 8px 15px; margin: 0; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="auth-card" id="loginBox">
        <h2>🏥 Hospital HQ</h2>
        <select id="userSelect"></select>
        <input type="password" id="passCode" placeholder="Enter PIN">
        <button style="background:var(--primary)" onclick="handleLogin()">Sign In</button>
    </div>
    <div class="auth-card hidden" id="otpBox">
        <h2>Security Setup</h2>
        <input type="password" id="newPin1" placeholder="New PIN">
        <input type="password" id="newPin2" placeholder="Confirm PIN">
        <button style="background:var(--success)" onclick="saveFirstPin()">Complete Setup</button>
    </div>
</div>

<div class="container hidden" id="dashboard">
    <div class="admin-bar">
        <div><strong id="userName"></strong> | <span id="userRole"></span></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-small" style="background:#6c757d" onclick="document.body.classList.toggle('dark')">Theme</button>
            <button class="btn-small" style="background:var(--danger)" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="alertArea"></div>

    <div class="section hidden" id="reportSection">
        <h3>📊 Hospital Status Report</h3>
        <button style="background:var(--primary); width:auto;" onclick="generateReport()">Generate Live Report</button>
        <div id="reportOutput" style="margin-top:10px; font-style:italic;"></div>
    </div>

    <div class="section" id="inventorySection">
        <h3>📦 Inventory Items</h3>
        <div id="invControls" class="control-group hidden">
            <input id="itemName" placeholder="Item Name">
            <input id="itemQty" type="number" placeholder="Qty">
            <input id="itemExp" type="date">
            <button style="background:var(--success); width:auto;" onclick="updateInventory()">Add/Update Stock</button>
        </div>
        <table id="inventoryTable"></table>
    </div>

    <div class="section" id="staffSection">
        <h3>👥 Personnel List</h3>
        <div id="staffControls" class="control-group hidden">
            <input id="sName" placeholder="Staff Name">
            <select id="sRole">
                <option value="Official 1">Official 1</option>
                <option value="Official 2">Official 2</option>
                <option value="Member">Member</option>
            </select>
            <button style="background:var(--primary); width:auto;" onclick="addStaff()">Register Staff</button>
        </div>
        <table id="staffTable"></table>
    </div>

    <div class="section hidden" id="takeoverSection">
        <h3>👑 Management Handover</h3>
        <div class="control-group">
            <select id="takeoverSelect"></select>
            <button style="background:var(--warning); color:black; width:auto;" onclick="transferOwnership()">Transfer Admin</button>
        </div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem("hosp_final_v4_u") || "[]");
    let inventory = JSON.parse(localStorage.getItem("hosp_final_v4_i") || "[]");
    let sessionUser = null;

    if (users.length === 0) {
        users.push({name: "Ibrahim", role: "Chief Admin", pin: "1234", isOTP: true});
        saveDB();
    }

    function saveDB() {
        localStorage.setItem("hosp_final_v4_u", JSON.stringify(users));
        localStorage.setItem("hosp_final_v4_i", JSON.stringify(inventory));
        document.getElementById("userSelect").innerHTML = users.map(u => `<option value="${u.name}">${u.name}</option>`).join('');
    }
    saveDB();

    function handleLogin() {
        const u = users.find(user => user.name === document.getElementById("userSelect").value && user.pin === document.getElementById("passCode").value);
        if (u) {
            sessionUser = u;
            u.isOTP ? (document.getElementById("loginBox").classList.add("hidden"), document.getElementById("otpBox").classList.remove("hidden")) : startDashboard();
        } else alert("Invalid PIN");
    }

    function saveFirstPin() {
        const p1 = document.getElementById("newPin1").value;
        if (p1 === document.getElementById("newPin2").value && p1.length >= 4) {
            users = users.map(u => u.name === sessionUser.name ? {...u, pin: p1, isOTP: false} : u);
            saveDB(); startDashboard();
        } else alert("PIN Error");
    }

    function startDashboard() {
        sessionUser = users.find(u => u.name === sessionUser.name);
        document.getElementById("loginOverlay").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("userName").innerText = `User: ${sessionUser.name}`;
        document.getElementById("userRole").innerHTML = `<span class="badge ${sessionUser.role.replace(/\s+/g, '')}">${sessionUser.role}</span>`;
        renderUI();
    }

    function renderUI() {
        const r = sessionUser.role;
        
        // Hide/Show Controls based on TOP OFFICIAL status
        if (["Chief Admin", "Official 1"].includes(r)) {
            document.getElementById("invControls").classList.remove("hidden");
            document.getElementById("reportSection").classList.remove("hidden");
        }
        if (["Chief Admin", "Official 2"].includes(r)) {
            document.getElementById("staffControls").classList.remove("hidden");
        }
        if (r === "Chief Admin") {
            document.getElementById("takeoverSection").classList.remove("hidden");
        }

        renderInventory();
        renderStaff();
        checkAlerts();
    }

    // --- Inventory ---
    function updateInventory() {
        const name = document.getElementById("itemName").value;
        const qty = parseInt(document.getElementById("itemQty").value);
        const exp = document.getElementById("itemExp").value;
        if(!name || isNaN(qty) || !exp) return alert("Fill all details");

        const existing = inventory.find(i => i.name.toLowerCase() === name.toLowerCase());
        if(existing) { existing.qty += qty; existing.exp = exp; }
        else { inventory.push({name, qty, exp}); }
        saveDB(); renderInventory(); checkAlerts();
    }

    function deleteItem(idx) {
        if(confirm("Remove item?")) { inventory.splice(idx, 1); saveDB(); renderInventory(); checkAlerts(); }
    }

    function renderInventory() {
        let html = `<tr><th>Item</th><th>Qty</th><th>Expiry</th><th>Action</th></tr>`;
        const today = new Date().toISOString().split('T')[0];
        const canEdit = ["Chief Admin", "Official 1"].includes(sessionUser.role);

        inventory.forEach((i, idx) => {
            const expired = i.exp < today;
            html += `<tr style="${expired ? 'color:red;font-weight:bold' : ''}">
                <td>${i.name} ${expired ? '(EXPIRED)' : ''}</td>
                <td>${i.qty}</td>
                <td>${i.exp}</td>
                <td>${canEdit ? `<button class="btn-small" style="background:var(--danger)" onclick="deleteItem(${idx})">Del</button>` : '-'}</td>
            </tr>`;
        });
        document.getElementById("inventoryTable").innerHTML = html;
    }

    // --- Staff ---
    function addStaff() {
        const n = document.getElementById("sName").value;
        const r = document.getElementById("sRole").value;
        if(n) { users.push({name: n, role: r, pin: "1234", isOTP: true}); saveDB(); renderStaff(); }
    }

    function delStaff(name) {
        if(confirm("Delete staff?")) { users = users.filter(u => u.name !== name); saveDB(); renderStaff(); }
    }

    function renderStaff() {
        let html = `<tr><th>Name</th><th>Role</th><th>Action</th></tr>`;
        const canEdit = ["Chief Admin", "Official 2"].includes(sessionUser.role);

        users.forEach(u => {
            const isSelf = u.name === sessionUser.name;
            const chiefAction = (sessionUser.role === "Chief Admin" && !isSelf);
            html += `<tr><td>${u.name}</td><td><span class="badge ${u.role.replace(/\s+/g, '')}">${u.role}</span></td>
            <td>${chiefAction ? `<button class="btn-small" style="background:var(--danger)" onclick="delStaff('${u.name}')">Remove</button>` : '-'}</td></tr>`;
        });
        document.getElementById("staffTable").innerHTML = html;
        document.getElementById("takeoverSelect").innerHTML = users.filter(u => u.name !== sessionUser.name).map(u => `<option value="${u.name}">${u.name}</option>`).join('');
    }

    // --- System ---
    function checkAlerts() {
        const today = new Date().toISOString().split('T')[0];
        const expired = inventory.filter(i => i.exp < today);
        const low = inventory.filter(i => i.qty < 5 && i.exp >= today);
        let h = "";
        if(expired.length > 0) h += `<div class="alert-box alert-danger">🚨 ${expired.length} Items Expired! Check inventory table.</div>`;
        if(low.length > 0) h += `<div class="alert-box alert-warning">⚠️ ${low.length} Items are low in stock.</div>`;
        document.getElementById("alertArea").innerHTML = h;
    }

    function generateReport() {
        const total = inventory.reduce((a, b) => a + b.qty, 0);
        document.getElementById("reportOutput").innerHTML = `Total Stock: ${total} | Total Staff: ${users.length} | Time: ${new Date().toLocaleTimeString()}`;
    }

    function transferOwnership() {
        const t = document.getElementById("takeoverSelect").value;
        if(confirm(`Promote ${t} to Chief Admin?`)) {
            users = users.map(u => {
                if (u.name === sessionUser.name) u.role = "Member";
                if (u.name === t) u.role = "Chief Admin";
                return u;
            });
            saveDB(); logout();
        }
    }
    function logout() { location.reload(); }
</script>
</body>
</html>
