<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital HQ - Secure Management System</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #333;
            --primary: #007bff;
            --danger: #dc3545;
            --success: #28a745;
            --admin: #e63946;
        }

        body.dark {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --primary: #375a7f;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }

        /* Login Overlay */
        #loginOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; background: var(--card); color: var(--text); }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; margin-top: 10px; color: white; }
        .btn-login { background: var(--primary); }
        .btn-logout { background: var(--danger); width: auto; padding: 8px 15px; }
        .btn-save { background: var(--success); }

        /* Dashboard Parts */
        .admin-bar { background: #2c3e50; color: white; padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section { background: var(--card); padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .hidden { display: none !important; }

        /* Tables & Badges */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: rgba(0,0,0,0.05); }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge.ChiefAdmin { background: var(--admin); color: white; }
        .badge.Official1 { background: #457b9d; color: white; }
        .badge.Official2 { background: #2a9d8f; color: white; }
        
        /* Special Sections */
        #takeoverSection { border: 2px solid #ffc107; background: rgba(255, 193, 7, 0.1); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="auth-card" id="loginBox">
        <h2>🏥 Hospital HQ</h2>
        <p>Login to your account</p>
        <select id="userSelect"></select>
        <input type="password" id="passCode" placeholder="Enter PIN">
        <button class="btn-login" onclick="handleLogin()">Sign In</button>
    </div>

    <div class="auth-card hidden" id="otpBox">
        <h2>New Account Setup</h2>
        <p>Set a secure 4-digit PIN</p>
        <input type="password" id="newPin1" placeholder="New PIN">
        <input type="password" id="newPin2" placeholder="Confirm PIN">
        <button class="btn-save" onclick="saveFirstPin()">Complete Setup</button>
    </div>
</div>

<div class="container hidden" id="dashboard">
    <div class="admin-bar">
        <div><strong id="userName"></strong> | <span id="userRole"></span></div>
        <div style="display:flex; gap:10px;">
            <button onclick="document.body.classList.toggle('dark')" style="background:#6c757d; width:auto; padding:8px;">Theme</button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="section hidden" id="staffSection">
        <h3>Staff Management</h3>
        <div id="staffControls" class="hidden" style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="newStaffName" placeholder="Staff Name" style="flex:2">
            <select id="newStaffRole" style="flex:1">
                <option value="Official 1">Official 1</option>
                <option value="Official 2">Official 2</option>
                <option value="Member">Member</option>
            </select>
            <button class="btn-save" onclick="addStaff()" style="width:120px; margin:0;">Add</button>
        </div>
        <table id="staffTable"></table>
    </div>

    <div class="section">
        <h3>Security Settings</h3>
        <p>Update your access PIN:</p>
        <div style="display:flex; gap:10px; max-width:400px;">
            <input type="password" id="changePinInput" placeholder="New PIN">
            <button class="btn-login" onclick="updatePin()" style="margin:0; width:120px;">Update</button>
        </div>
    </div>

    <div class="section hidden" id="takeoverSection">
        <h3>Management Handover</h3>
        <p>Promote a staff member to <b>Chief Admin</b>. This will remove your admin status.</p>
        <div style="display:flex; gap:10px;">
            <select id="takeoverSelect" style="flex:1"></select>
            <button onclick="transferOwnership()" style="background:#ffc107; color:black; width:200px; margin:0;">Transfer Leadership</button>
        </div>
    </div>
</div>

<script>
    // --- Data Management ---
    let users = JSON.parse(localStorage.getItem("hospital_db") || "[]");
    let sessionUser = null;

    if (users.length === 0) {
        users.push({name: "Ibrahim", role: "Chief Admin", pin: "1234", isOTP: true});
        saveDB();
    }

    function saveDB() {
        localStorage.setItem("hospital_db", JSON.stringify(users));
        refreshLoginDropdown();
    }

    function refreshLoginDropdown() {
        document.getElementById("userSelect").innerHTML = users.map(u => `<option value="${u.name}">${u.name}</option>`).join('');
    }
    refreshLoginDropdown();

    // --- Authentication ---
    function handleLogin() {
        const name = document.getElementById("userSelect").value;
        const pin = document.getElementById("passCode").value;
        const userFound = users.find(u => u.name === name && u.pin === pin);

        if (userFound) {
            sessionUser = userFound;
            if (userFound.isOTP) {
                document.getElementById("loginBox").classList.add("hidden");
                document.getElementById("otpBox").classList.remove("hidden");
            } else {
                startDashboard();
            }
        } else {
            alert("❌ Incorrect PIN");
        }
    }

    function saveFirstPin() {
        const p1 = document.getElementById("newPin1").value;
        const p2 = document.getElementById("newPin2").value;
        if (p1 === p2 && p1.length >= 4) {
            updateUserInData(sessionUser.name, { pin: p1, isOTP: false });
            document.getElementById("otpBox").classList.add("hidden");
            startDashboard();
        } else {
            alert("❌ PINs must match and be 4+ digits");
        }
    }

    function startDashboard() {
        // Always pull the freshest data from the "Database"
        sessionUser = users.find(u => u.name === sessionUser.name);
        
        document.getElementById("loginOverlay").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("userName").innerText = `User: ${sessionUser.name}`;
        document.getElementById("userRole").innerHTML = `<span class="badge ${sessionUser.role.replace(/\s/g, '')}">${sessionUser.role}</span>`;
        
        renderUI();
    }

    // --- Dashboard UI Logic ---
    function renderUI() {
        const role = sessionUser.role;

        // Permissions
        if (role === "Chief Admin" || role === "Official 2") {
            document.getElementById("staffSection").classList.remove("hidden");
            document.getElementById("staffControls").classList.remove("hidden");
        } else {
            document.getElementById("staffSection").classList.add("hidden");
        }

        if (role === "Chief Admin") {
            document.getElementById("takeoverSection").classList.remove("hidden");
        } else {
            document.getElementById("takeoverSection").classList.add("hidden");
        }

        renderStaffTable();
    }

    function renderStaffTable() {
        let html = `<tr><th>Name</th><th>Role</th><th>Status</th><th>Actions</th></tr>`;
        users.forEach(u => {
            // THE MASTER KEY: Current Chief Admin can delete anyone except themselves
            const canDelete = (sessionUser.role === "Chief Admin" && u.name !== sessionUser.name);
            
            html += `<tr>
                <td>${u.name}</td>
                <td><span class="badge ${u.role.replace(/\s+/g, '')}">${u.role}</span></td>
                <td>${u.isOTP ? 'New' : 'Active'}</td>
                <td>${canDelete ? `<button onclick="removeStaff('${u.name}')" style="background:var(--danger); width:auto; padding:5px 10px; margin:0;">Delete</button>` : '-'}</td>
            </tr>`;
        });
        document.getElementById("staffTable").innerHTML = html;

        // Update Handover Dropdown
        document.getElementById("takeoverSelect").innerHTML = users
            .filter(u => u.name !== sessionUser.name)
            .map(u => `<option value="${u.name}">${u.name}</option>`).join('');
    }

    // --- Actions ---
    function addStaff() {
        const name = document.getElementById("newStaffName").value;
        const role = document.getElementById("newStaffRole").value;
        if (!name) return alert("Enter a name");
        if (users.find(u => u.name === name)) return alert("User already exists");

        users.push({name, role, pin: "1234", isOTP: true});
        saveDB();
        document.getElementById("newStaffName").value = "";
        renderStaffTable();
    }

    function removeStaff(name) {
        if (confirm(`Permanently remove ${name}?`)) {
            users = users.filter(u => u.name !== name);
            saveDB();
            renderStaffTable();
        }
    }

    function updatePin() {
        const newPin = document.getElementById("changePinInput").value;
        if (newPin.length < 4) return alert("PIN must be 4+ digits");

        updateUserInData(sessionUser.name, { pin: newPin });
        alert("✅ PIN Updated Successfully!");
        document.getElementById("changePinInput").value = "";
    }

    function transferOwnership() {
        const target = document.getElementById("takeoverSelect").value;
        if (!target) return;

        if (confirm(`Make ${target} the new Chief Admin? You will lose admin rights.`)) {
            users = users.map(u => {
                if (u.name === sessionUser.name) u.role = "Member";
                if (u.name === target) u.role = "Chief Admin";
                return u;
            });
            saveDB();
            alert("Leadership Transferred. Logging out...");
            logout();
        }
    }

    function updateUserInData(name, data) {
        users = users.map(u => u.name === name ? {...u, ...data} : u);
        saveDB();
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
