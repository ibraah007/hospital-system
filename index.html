<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hospital HQ - Final System</title>

<style>
body { font-family: Arial; background:#f0f2f5; margin:20px; }
.container { max-width:1100px; margin:auto; }
.section { background:white; padding:20px; margin-bottom:20px; border-radius:8px; }
button { padding:10px; margin:5px; cursor:pointer; }
.hidden { display:none; }
#loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:black; display:flex; justify-content:center; align-items:center; }
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
<div style="background:white;padding:30px;border-radius:10px;text-align:center;">
<h2>Login</h2>
<select id="userSelect"></select><br>
<input type="password" id="passCode" placeholder="PIN"><br>
<button onclick="handleLogin()">Login</button>
</div>

<div id="otpBox" class="hidden" style="background:white;padding:30px;border-radius:10px;text-align:center;">
<h3>Set New PIN</h3>
<input type="password" id="newPin" placeholder="New PIN"><br>
<input type="password" id="confirmPin" placeholder="Confirm PIN"><br>
<button onclick="saveFirstPin()">Save</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboard">

<h2 id="welcome"></h2>
<button onclick="logout()">Logout</button>

<div class="section">
<h3>Report</h3>
<button id="genBtn" class="hidden" onclick="generateReport()">Generate</button>
<div id="report"></div>
</div>

<div class="section">
<h3>Staff</h3>
<div id="staffControls" class="hidden">
<input id="s_name" placeholder="Name">
<select id="s_role">
<option>Official 1</option>
<option>Official 2</option>
<option>Member</option>
</select>
<button onclick="addStaff()">Add</button>
</div>
<table id="staffTable"></table>
</div>

<div class="section">
<h3>Inventory</h3>
<div id="invControls" class="hidden">
<input id="i_name" placeholder="Item">
<input id="i_qty" type="number" placeholder="Qty">
<input id="i_exp" type="date">
<button onclick="addItem()">Update</button>
</div>
<table id="invTable"></table>
</div>

<div class="section hidden" id="takeoverSection">
<h3>New Management</h3>
<select id="takeoverSelect"></select>
<button onclick="handleTakeover()">Take Over</button>
</div>

</div>

<script>

// LOAD DATA
let users = JSON.parse(localStorage.getItem("users") || "[]");
let inventory = JSON.parse(localStorage.getItem("inventory") || "[]");
let report = JSON.parse(localStorage.getItem("report") || "null");

// ✅ ENSURE IBRAHIM ALWAYS ADMIN
let ib = users.find(u => u.name === "Ibrahim");

if(!ib){
    users.push({name:"Ibrahim", role:"Chief Admin", pin:"1234", isOTP:true});
} else {
    ib.role = "Chief Admin";
}

saveUsers();

// LOGIN INIT
function init(){
document.getElementById("userSelect").innerHTML =
users.map(u=>`<option>${u.name}</option>`).join('');
}
init();

let currentUser = null;

// LOGIN
function handleLogin(){
let name = userSelect.value;
let pin = passCode.value;

let user = users.find(u=>u.name===name && u.pin===pin);

if(!user) return alert("Wrong PIN");

currentUser = user;

if(user.isOTP){
loginOverlay.children[0].classList.add("hidden");
otpBox.classList.remove("hidden");
}else{
loginSuccess();
}
}

// OTP
function saveFirstPin(){
let p1 = newPin.value;
let p2 = confirmPin.value;

if(p1!==p2 || p1.length<4) return alert("Invalid PIN");

currentUser.pin = p1;
currentUser.isOTP = false;

saveUsers();
loginSuccess();
}

// SUCCESS
function loginSuccess(){
loginOverlay.style.display="none";
dashboard.classList.remove("hidden");

welcome.innerText = currentUser.name + " ("+currentUser.role+")";

applyPermissions();
renderAll();
renderReport();
}

// PERMISSIONS
function applyPermissions(){
if(currentUser.role==="Chief Admin"){
genBtn.classList.remove("hidden");
invControls.classList.remove("hidden");
staffControls.classList.remove("hidden");
takeoverSection.classList.remove("hidden");
}

if(currentUser.role==="Official 1"){
genBtn.classList.remove("hidden");
invControls.classList.remove("hidden");
}

if(currentUser.role==="Official 2"){
staffControls.classList.remove("hidden");
}
}

// STAFF
function addStaff(){
let name = s_name.value;
if(!name) return;

users.push({name, role:s_role.value, pin:"1234", isOTP:true});
saveUsers();
renderAll();
}

// INVENTORY (UPDATE NOT DUPLICATE)
function addItem(){
let n = i_name.value;
let q = parseInt(i_qty.value);
let e = i_exp.value;

if(!n || !q) return;

let item = inventory.find(i=>i.name.toLowerCase()===n.toLowerCase());

if(item){
item.qty += q;
item.exp = e || item.exp;
}else{
inventory.push({name:n, qty:q, exp:e});
}

saveInventory();
renderAll();
}

// DELETE
function delStaff(n){
users = users.filter(u=>u.name!==n);
saveUsers(); renderAll();
}

function delItem(i){
inventory.splice(i,1);
saveInventory(); renderAll();
}

// RENDER
function renderAll(){

// STAFF
staffTable.innerHTML = `
<tr><th>Name</th><th>Role</th><th>Action</th></tr>` +
users.map(u=>`
<tr>
<td>${u.name}</td>
<td>${u.role}</td>
<td>${currentUser.role==="Chief Admin" && u.name!==currentUser.name ?
`<button onclick="delStaff('${u.name}')">Delete</button>`:"-"}</td>
</tr>`).join("");

// INVENTORY
invTable.innerHTML = `
<tr><th>Item</th><th>Qty</th><th>Status</th><th>Action</th></tr>` +
inventory.map((i,index)=>{

let status = "OK";

if(i.exp && i.exp < new Date().toISOString().split('T')[0]){
status = "EXPIRED";
}

return `
<tr>
<td>${i.name}</td>
<td>${i.qty}</td>
<td>${status}</td>
<td>${(currentUser.role==="Chief Admin"||currentUser.role==="Official 1")?
`<button onclick="delItem(${index})">Delete</button>`:"-"}</td>
</tr>`;
}).join("");

// TAKEOVER LIST
takeoverSelect.innerHTML =
users.filter(u=>u.name!==currentUser.name)
.map(u=>`<option>${u.name}</option>`).join("");
}

// REPORT
function generateReport(){
report = {
staff: users.length,
items: inventory.length,
low: inventory.filter(i=>i.qty<20).length
};

localStorage.setItem("report", JSON.stringify(report));
renderReport();
}

function renderReport(){
if(!report) return report.innerHTML="No report";

document.getElementById("report").innerHTML =
`Staff: ${report.staff} | Items: ${report.items} | Low Stock: ${report.low}`;
}

// 🔥 TAKEOVER (FULL RESET)
function handleTakeover(){

let target = takeoverSelect.value;
if(!target) return;

users = users.filter(u=>u.name===target);
users[0].role = "Chief Admin";
users[0].isOTP = true;

// CLEAR SYSTEM
inventory = [];
report = null;

saveUsers();
saveInventory();
localStorage.removeItem("report");

alert("New Management Active");

logout();
}

// SAVE
function saveUsers(){
localStorage.setItem("users", JSON.stringify(users));
}
function saveInventory(){
localStorage.setItem("inventory", JSON.stringify(inventory));
}

// LOGOUT
function logout(){
location.reload();
}

</script>

</body>
</html>
