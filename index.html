<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital HQ - Advanced Management System</title>
    <style>
        :root {
            --bg: #f4f7f6; --card: #ffffff; --text: #333;
            --primary: #007bff; --danger: #dc3545; --success: #28a745; 
            --admin: #e63946; --warning: #ffc107; --border: #ddd;
        }
        body.dark {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; 
            --primary: #375a7f; --border: #333;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }

        /* Auth UI */
        #loginOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }

        /* Dashboard UI */
        .admin-bar { background: #2c3e50; color: white; padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section { background: var(--card); padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .hidden { display: none !important; }

        /* Alerts */
        .alert-box { padding: 15px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; border-left: 6px solid; }
        .alert-danger { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border-color: #ffeeba; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(0,0,0,0.05); }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; }
        .badge.ChiefAdmin { background: var(--admin); color: white; }
        .badge.Official1 { background: #457b9d; color: white; }
        .badge.Official2 { background: #2a9d8f; color: white; }

        .control-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .control-group input, .control-group select { flex: 1; min-width: 120px; }
        .btn-action { width: auto; padding: 10px 20px; margin: 0; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="auth-card" id="loginBox">
        <h2>🏥 Hospital HQ</h2>
        <select id="userSelect"></select>
        <input type="password" id="passCode" placeholder="Enter PIN">
        <button style="background:var(--primary)" onclick="handleLogin()">Sign In</button>
    </div>
    <div class="auth-card hidden" id="otpBox">
        <h2>Security Setup</h2>
        <p>Set your private 4-digit PIN</p>
        <input type="password" id="newPin1" placeholder="New PIN">
        <input type="password" id="newPin2" placeholder="Confirm PIN">
        <button style="background:var(--success)" onclick="saveFirstPin()">Complete Setup</button>
    </div>
</div>

<div class="container hidden" id="dashboard">
    <div class="admin-bar">
        <div><strong id="userName"></strong> | <span id="userRole"></span></div>
        <div style="display:flex; gap:10px;">
            <button class="btn-action" style="background:#6c757d" onclick="document.body.classList.toggle('dark')">Theme</button>
            <button class="btn-action" style="background:var(--danger)" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="alertArea"></div>

    <div class="section hidden" id="reportSection">
        <h3>📊 Hospital Status Report</h3>
        <button class="btn-action" style="background:var(--primary)" onclick="generateReport()">Generate Live Report</button>
        <div id="reportOutput" style="margin-top:15px; padding:15px; background:rgba(0,0,0,0.03); border-radius:8px;">
            Click to see stock and staff statistics.
        </div>
    </div>

    <div class="section hidden" id="inventorySection">
        <h3>📦 Inventory & Stock</h3>
        <div id="invControls" class="control-group hidden">
            <input id="itemName" placeholder="Item Name">
            <input id="itemQty" type="number" placeholder="Qty">
            <input id="itemExp" type="date" title="Expiry Date">
            <button class="btn-action" style="background:var(--success)" onclick="addInventory()">Update</button>
        </div>
        <table id="inventoryTable"></table>
    </div>

    <div class="section hidden" id="staffSection">
        <h3>👥 Staff Management</h3>
        <div id="staffControls" class="control-group hidden">
            <input id="sName" placeholder="Name">
            <select id="sRole">
                <option value="Official 1">Official 1 (Inventory/Reports)</option>
                <option value="Official 2">Official 2 (Staff)</option>
                <option value="Member">Member</option>
            </select>
            <button class="btn-action" style="background:var(--primary)" onclick="addStaff()">Add</button>
        </div>
        <table id="staffTable"></table>
    </div>

    <div class="section hidden" id="takeoverSection">
        <h3>👑 Ownership Handover</h3>
        <div class="control-group">
            <select id="takeoverSelect"></select>
            <button class="btn-action" style="background:var(--warning); color:black" onclick="transferOwnership()">Transfer Leadership</button>
        </div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem("hosp_v3_users") || "[]");
    let inventory = JSON.parse(localStorage.getItem("hosp_v3_inv") || "[]");
    let sessionUser = null;

    if (users.length === 0) {
        users.push({name: "Ibrahim", role: "Chief Admin", pin: "1234", isOTP: true});
        saveDB();
    }

    function saveDB() {
        localStorage.setItem("hosp_v3_users", JSON.stringify(users));
        localStorage.setItem("hosp_v3_inv", JSON.stringify(inventory));
        document.getElementById("userSelect").innerHTML = users.map(u => `<option value="${u.name}">${u.name}</option>`).join('');
    }
    saveDB();

    function handleLogin() {
        const name = document.getElementById("userSelect").value;
        const pin = document.getElementById("passCode").value;
        const u = users.find(user => user.name === name && user.pin === pin);
        if (u) {
            sessionUser = u;
            u.isOTP ? (document.getElementById("loginBox").classList.add("hidden"), document.getElementById("otpBox").classList.remove("hidden")) : startDashboard();
        } else alert("Invalid PIN");
    }

    function saveFirstPin() {
        const p1 = document.getElementById("newPin1").value;
        const p2 = document.getElementById("newPin2").value;
        if (p1 === p2 && p1.length >= 4) {
            users = users.map(u => u.name === sessionUser.name ? {...u, pin: p1, isOTP: false} : u);
            saveDB(); startDashboard();
        } else alert("PINs must match and be 4+ digits");
    }

    function startDashboard() {
        sessionUser = users.find(u => u.name === sessionUser.name);
        document.getElementById("loginOverlay").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("userName").innerText = `User: ${sessionUser.name}`;
        document.getElementById("userRole").innerHTML = `<span class="badge ${sessionUser.role.replace(/\s+/g, '')}">${sessionUser.role}</span>`;
        renderUI();
    }

    function renderUI() {
        const r = sessionUser.role;
        // Roles: Official 1 (Inv/Reports), Official 2 (Staff), Chief Admin (All)
        if (["Chief Admin", "Official 1"].includes(r)) {
            document.getElementById("inventorySection").classList.remove("hidden");
            document.getElementById("invControls").classList.remove("hidden");
            document.getElementById("reportSection").classList.remove("hidden");
        }
        if (["Chief Admin", "Official 2"].includes(r)) {
            document.getElementById("staffSection").classList.remove("hidden");
            document.getElementById("staffControls").classList.remove("hidden");
        }
        if (r === "Chief Admin") document.getElementById("takeoverSection").classList.remove("hidden");

        renderInventory();
        renderStaff();
        checkAlerts();
    }

    // --- Inventory & Outdated Tracking ---
    function addInventory() {
        const name = document.getElementById("itemName").value;
        const qty = parseInt(document.getElementById("itemQty").value);
        const exp = document.getElementById("itemExp").value;
        if(!name || isNaN(qty) || !exp) return alert("Fill all inventory fields!");

        inventory.push({name, qty, exp});
        saveDB(); renderInventory(); checkAlerts();
    }

    function renderInventory() {
        let html = `<tr><th>Item</th><th>Qty</th><th>Expiry</th><th>Status</th></tr>`;
        const today = new Date().toISOString().split('T')[0];
        inventory.forEach(i => {
            const isOutdated = i.exp < today;
            const status = isOutdated ? `<b style="color:var(--danger)">OUTDATED</b>` : (i.qty < 10 ? `<b style="color:var(--warning)">LOW</b>` : `OK`);
            html += `<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.exp}</td><td>${status}</td></tr>`;
        });
        document.getElementById("inventoryTable").innerHTML = html;
    }

    function checkAlerts() {
        const today = new Date().toISOString().split('T')[0];
        const expired = inventory.filter(i => i.exp < today);
        const low = inventory.filter(i => i.qty < 10 && i.exp >= today);
        
        let alertHtml = "";
        if(expired.length > 0) alertHtml += `<div class="alert-box alert-danger">🚨 CRITICAL: ${expired.length} items are OUTDATED/EXPIRED!</div>`;
        if(low.length > 0) alertHtml += `<div class="alert-box alert-warning">⚠️ WARNING: ${low.length} items are LOW on stock!</div>`;
        document.getElementById("alertArea").innerHTML = alertHtml;
    }

    // --- Reports ---
    function generateReport() {
        const today = new Date().toISOString().split('T')[0];
        const outdated = inventory.filter(i => i.exp < today).length;
        const totalItems = inventory.reduce((acc, curr) => acc + curr.qty, 0);
        
        document.getElementById("reportOutput").innerHTML = `
            <strong>Generated by:</strong> ${sessionUser.name} <br>
            <strong>Total Personnel:</strong> ${users.length} <br>
            <strong>Total Inventory Stock:</strong> ${totalItems} units <br>
            <strong>Outdated Items to Dispose:</strong> ${outdated} <br>
            <strong>Report Time:</strong> ${new Date().toLocaleString()}
        `;
    }

    // --- Staff Logic ---
    function addStaff() {
        const n = document.getElementById("sName").value;
        const r = document.getElementById("sRole").value;
        if(!n) return;
        users.push({name: n, role: r, pin: "1234", isOTP: true});
        saveDB(); renderStaff();
    }

    function renderStaff() {
        let html = `<tr><th>Name</th><th>Role</th><th>Actions</th></tr>`;
        users.forEach(u => {
            const canDelete = (sessionUser.role === "Chief Admin" && u.name !== sessionUser.name);
            html += `<tr><td>${u.name}</td><td><span class="badge ${u.role.replace(/\s+/g, '')}">${u.role}</span></td>
            <td>${canDelete ? `<button onclick="removeStaff('${u.name}')" style="background:var(--danger); width:auto; padding:5px 10px;">Remove</button>` : '-'}</td></tr>`;
        });
        document.getElementById("staffTable").innerHTML = html;
        document.getElementById("takeoverSelect").innerHTML = users.filter(u => u.name !== sessionUser.name).map(u => `<option value="${u.name}">${u.name}</option>`).join('');
    }

    function removeStaff(n) { if(confirm(`Delete ${n}?`)) { users = users.filter(u => u.name !== n); saveDB(); renderStaff(); }}

    function transferOwnership() {
        const t = document.getElementById("takeoverSelect").value;
        if(confirm(`Promote ${t} to Chief Admin?`)) {
            users = users.map(u => {
                if (u.name === sessionUser.name) u.role = "Member";
                if (u.name === t) u.role = "Chief Admin";
                return u;
            });
            saveDB(); logout();
        }
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
